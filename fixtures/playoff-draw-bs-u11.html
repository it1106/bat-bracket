<script>
  const slideElements = Array.from(document.querySelectorAll('.js-bracket > swiper-container > swiper-slide'));
  let players = [];
  let selectedPlayer = 0;
  let highlightedPlayer = 0;

  function setupPlayerIndex() {
    players.length = 0;
    $('.match__row-title-value-content a', slideElements[0]).each(function (index, player) {
      players.push($(player).data('player-id')); //fill array with playerid's
    });
  }

  $(function () {
    $('.js-predefined-autosuggest').VisualAutoSuggest({
      minCharsMessage: 'Please fill in at least 3 characters',
      initialResultListHtmlSelector: '#js-predefined-list',
      onSelectItem: function (ASelectedItem, ASelectedValue) {
        highlightParentElements(ASelectedValue);
      },
    });
    setupPlayerIndex();
  });

  function highlightParentElements(playerId) {
    removeHighlightedClasses();
    const elements = document.querySelectorAll(`.bracket [data-player-id="${playerId}"]`);

    elements.forEach((el, index) => {
      const parentMatch = el.closest('.match');
      const parentTitle = el.closest('.match__row');
      if (parentTitle) {
        parentTitle.classList.add('highlighted');
      }

      const parentGroup = parentMatch?.closest('.bracket-round__match-group-wrapper');

      const nextElement = elements[index + 1];
      if (parentMatch && parentGroup && nextElement) {
        const nextMatch = nextElement.closest('.match');

        if (nextMatch) {
          if (parentMatch.parentElement?.classList.contains('bracket-round__match-group')) {
            const matchesInGroup = Array.from(parentMatch.parentElement.children);
            const matchIndex = matchesInGroup.indexOf(parentMatch);

            if (matchIndex === 0) {
              parentGroup.classList.add('top_highlighted');
            } else if (matchIndex === 1) {
              parentGroup.classList.add('bottom_highlighted');
            }
          }
        }
      }
    });

    const firstElement = elements[0];
    if (firstElement) {
      highlightedPlayer = playerId;
      /*
      firstElement.scrollIntoView({
        behavior: 'smooth',
        block: 'center',
        inline: 'nearest'
      });*/
      $('html,body').animate({
        scrollTop: $(firstElement).offset().top - $(window).height() / 2
      }, 200);
    }
  }

  function removeHighlightedClasses() {
    highlightedPlayer = 0;
    const swiperElement = document.querySelector('.js-bracket > swiper-container');
    if (swiperElement && swiperElement.swiper) {
      swiperElement.swiper.slideTo(0);
    }

    document.querySelectorAll('.match__row.highlighted').forEach((el) => {
      el.classList.remove('highlighted');
    });

    document.querySelectorAll('.bracket-round__match-group-wrapper.top_highlighted').forEach((el) => {
      el.classList.remove('top_highlighted');
    });

    document.querySelectorAll('.bracket-round__match-group-wrapper.bottom_highlighted').forEach((el) => {
      el.classList.remove('bottom_highlighted');
    });
  }
</script>

<script>
  (function () {
    const swiperSlideOffset = 60;
    const swiperElement = document.querySelector('.js-bracket > swiper-container');
    const slideElements = Array.from(document.querySelectorAll('.js-bracket > swiper-container > swiper-slide'));
    let swiperMaxHeight = document.querySelector('.js-bracket > swiper-container > swiper-slide').offsetHeight;
    const swiperRoundsHeader = document.querySelector('.js-swiper-bracket-header');
    const headerIsPinnedClassName = 'is-pinned';
    const subheadingElements = Array.from(document.querySelectorAll('.js-subheading'));
    let setFirstRoundHeaderWidth = true;
    let swiperCurrentScrollPos = 0;
    let activeIndex = 0;
    let swiperStartRealIndex = activeIndex > 0 ? activeIndex : 0;
    const transitionTimeout = 400;
    const entrantInfoToggleCheckbox = document.getElementById('entrant-info-toggle');

    const scrollSelectedPlayerInView = (realIndex) => {
      if (typeof realIndex !== 'undefined') {
        let matchIndex = 0;
        const playerIndex = players.indexOf(selectedPlayer);
        if (playerIndex >= 0) { //is player found in the first round?
          matchIndex = Math.ceil((playerIndex + 1) / 2);
          for (let i = 1; i <= realIndex; i++) {
            matchIndex = Math.ceil(matchIndex / 2)
          }
          $('.match__row-title-value-content a', slideElements[realIndex]).each(function (index, match) {
            if (((index + 1) / 2) === matchIndex) { //index starts at 0 and there are 2 players a match
              let el = match.closest('.match');
              setTimeout(() => {
                $('html,body').animate({
                  scrollTop: $(el).offset().top - $(window).height() / 2
                }, 200);
              }, 400);
            }
          });
        }
      }
    };

    const selectPlayer = (currentIndex) => {
      let i = 0;
      if (currentIndex === 0) {
        const elements = $('.match__row-title-value-content a', slideElements[currentIndex]);
        $(elements).each(function (index, player) {
          let el = player.closest('.match');
          if (elementIsVisibleInVerticalViewport(el)) {
            i++;
          }
        });
        if (i > 0) {
          i = Math.round(i / 2);
          if (i > 0) {
            $(elements).each(function (index, player) {
              let el = player.closest('.match');
              if (elementIsVisibleInVerticalViewport(el)) {
                if (i === 0) {
                  selectedPlayer = $(player).data('player-id');
                  if (selectedPlayer === null || selectedPlayer === undefined) {
                    selectedPlayer = 0;
                  }
                  return false;
                }
                i--;
              }
            });
          }
        }
      }
    };

    swiperElement.addEventListener('swipersnapindexchange', (event) => {
      const previousIndex = event.target.swiper ? event.target.swiper.previousIndex : 0;
      const realIndex = event.target.swiper ? event.target.swiper.realIndex : 0;

      if (highlightedPlayer !== 0) {
        selectedPlayer = highlightedPlayer;
      } else {
        if (previousIndex === 0) {
          selectPlayer(previousIndex);
        }
      }
      scrollSelectedPlayerInView(realIndex);
    });

    const elementIsVisibleInVerticalViewport = (el) => {
      let elementTop = $(el).offset().top;
      let elementBottom = elementTop + $(el).outerHeight();
      let viewportTop = $(window).scrollTop();
      let viewportBottom = viewportTop + window.innerHeight;

      return elementBottom > viewportTop && elementTop < viewportBottom && elementBottom < viewportBottom && elementTop > viewportTop;
    };

    $('#DropDownAutoSuggestListQuery').on('input', function () {
      const selectedValue = $(this).val();
      if (!selectedValue) {
        removeHighlightedClasses();
      }
    });

    document.querySelectorAll('.js-formcontrol_clear').forEach((el) => {
      el.addEventListener('click', function () {
        removeHighlightedClasses();
      });
    });

    entrantInfoToggleCheckbox.addEventListener('change', (ev) => {
      setFirstRoundHeaderWidth = true;
      setTimeout(setSubheadingDimensions, transitionTimeout);
    });

    const shouldSwiperMoveInViewport = () => {
      if (!swiperRoundsHeader.classList.contains(headerIsPinnedClassName)) return false;
      const { top, bottom } = swiperElement.parentNode.getBoundingClientRect();
      return (top < 0 && bottom > 0);
    };

    swiperElement.addEventListener('swiperrealindexchange', (event) => {
      const realIndex = event.target.swiper.realIndex;
      const isEnd = event.target.swiper.isEnd;
      setSubheadingDimensions(realIndex, isEnd);

      swiperMaxHeight = Math.max(swiperMaxHeight, document.querySelector('.js-bracket > swiper-container > swiper-slide').offsetHeight);


      let newHeight = swiperMaxHeight;
      if (realIndex) {
        newHeight = swiperMaxHeight / (realIndex * 2) + swiperSlideOffset;
      }
      let newScrollY = swiperCurrentScrollPos;
      let scrollTimeOut = 100;
      if (swiperCurrentScrollPos > 0 && shouldSwiperMoveInViewport() && !isEnd) {
        const prevHeight = swiperStartRealIndex > 0 ? swiperMaxHeight / (swiperStartRealIndex * 2) + swiperSlideOffset : swiperMaxHeight;
        const heightDifference = Math.max(prevHeight, newHeight) - Math.min(prevHeight, newHeight);
        if (prevHeight > newHeight) {
          newScrollY = swiperCurrentScrollPos - heightDifference;
        } else {
          scrollTimeOut = heightDifference > 800 ? 200 : scrollTimeOut;
          newScrollY = swiperCurrentScrollPos + heightDifference;
        }
        if (newScrollY < 0) {
          newScrollY = swiperCurrentScrollPos;
        }
      }
      if (swiperRoundsHeader.classList.contains(headerIsPinnedClassName)) {
        setTimeout(() => window.scroll(window.scrollX, newScrollY), scrollTimeOut);
      }
      document.body.style.setProperty('--swiper-height', newHeight + 'px');
    });

    swiperElement.addEventListener('swiperpaginationupdate', (event) => {
      swiperCurrentScrollPos = window.scrollY;
      const realIndex = event.target.swiper ? event.target.swiper.realIndex : 0;
      const isEnd = event.target.swiper ? event.target.swiper.isEnd : false;
      setSubheadingDimensions(realIndex, isEnd);
    });

    swiperElement.addEventListener('swipersliderfirstmove', (event) => {
      swiperCurrentScrollPos = window.scrollY;
      swiperStartRealIndex = event.target.swiper?.realIndex || 0;
    });

    const setSubheadingDimensions = (realIndex, isEnd) => {
      swiperRoundsHeader.classList.remove('is-visible');
      const widths = [];
      subheadingElements.forEach((subheading, i) => {
        if (slideElements[i]) {
          if (entrantInfoToggleCheckbox.checked && i === 0 && !setFirstRoundHeaderWidth) {
            widths.push(subheading.offsetWidth);
          } else {
            const elmStyle = window.getComputedStyle(slideElements[i]);
            subheading.style.width = `${slideElements[i].offsetWidth}px`;
            subheading.style.paddingLeft = elmStyle.getPropertyValue('padding-left');
            widths.push(slideElements[i].offsetWidth);
          }
        }
      });
      setFirstRoundHeaderWidth = false;
      if (typeof realIndex !== 'undefined' && slideElements[realIndex] && !isEnd) {

        subheadingElements[realIndex].scrollIntoView({ block: 'nearest', inline: 'start' });
      }
      swiperRoundsHeader.classList.add('is-visible');
    }

    swiperElement.addEventListener('swiperreachend', () => {
      subheadingElements[subheadingElements.length - 1].scrollIntoView({ block: 'nearest', inline: 'end' });
      setTimeout(() => {
        subheadingElements[subheadingElements.length - 1].scrollIntoView({ block: 'nearest', inline: 'end' });
      }, 400);
    });

    swiperElement.addEventListener('swiperslidesupdated', (event) => {

      if (activeIndex > 0 && event.target.swiper) {
        event.target.swiper.activeIndex = activeIndex;
        activeIndex = 0;
        setTimeout(() => {
          setSubheadingDimensions(event.target.swiper.activeIndex, event.target.swiper.activeIndex === slideElements.length - 1);
        }, transitionTimeout);
      } else {
        setTimeout(setSubheadingDimensions, transitionTimeout);
      }
      const swiperPaginationElement = swiperElement.shadowRoot.querySelector('.swiper-pagination');
      if (swiperPaginationElement) {
        swiperRoundsHeader.appendChild(swiperElement.shadowRoot.querySelector('.swiper-pagination'));
      }
    });

    const observer = new IntersectionObserver(
      ([e]) => e.target.classList.toggle(headerIsPinnedClassName, e.intersectionRatio < .996),
      { threshold: [.996] }
    );
    observer.observe(swiperRoundsHeader);
  })();
</script>
